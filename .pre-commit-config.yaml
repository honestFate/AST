default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff
        name: linter
        entry: ruff check
        language: system
        types: [python]

      - id: pytest
        name: tests
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
        files: ^task\d+/