repos:
  - repo: local
    hooks:
      - id: ruff
        name: linter
        entry: ruff check
        types: [python]
        args: ["task1"]
        language: system
        pass_filenames: false
      - id: pytest
        name: tests
        entry: pytest
        args: ["task1/task1_3.py"]
        language: system
        pass_filenames: false